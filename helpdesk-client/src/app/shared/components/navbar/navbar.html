<div class="navbar">

    <!-- Left: Toggle + Breadcrumb -->
    <div class="navbar-left">
        <button mat-icon-button class="toggle-btn" (click)="toggleSidebar.emit()" matTooltip="Toggle sidebar">
            <mat-icon>menu</mat-icon>
        </button>

        <div class="breadcrumb">
            <span class="breadcrumb-item">HelpDesk</span>
            <mat-icon class="breadcrumb-separator">chevron_right</mat-icon>
            <span class="breadcrumb-current">Portal</span>
        </div>
    </div>

    <!-- Right: Actions + Profile -->
    <div class="navbar-right">

        <!-- Quick Actions -->
        <div class="quick-actions">
            @if (auth.isAdmin() || auth.isUser()) {
            <button mat-stroked-button routerLink="/tickets/new" class="quick-action-btn">
                <mat-icon>add_circle</mat-icon>
                <span>New Ticket</span>
            </button>
            }
        </div>

        <!-- Profile Menu -->
        <div class="profile-section" [matMenuTriggerFor]="profileMenu">
            <div class="avatar" [style.background]="roleColor">
                @if (profilePicUrl) {
                    <img [src]="profilePicUrl" alt="Avatar" class="avatar-img" [style.object-position]="profilePicPosition" />
                } @else {
                    {{ userInitial }}
                }
            </div>
            <div class="user-info">
                <span class="user-name">{{ userDisplayName }}</span>
                <span class="user-role">{{ userRoleLabel }}</span>
            </div>
            <mat-icon class="chevron">expand_more</mat-icon>
        </div>

        <!-- Profile Dropdown -->
        <mat-menu #profileMenu="matMenu" class="profile-menu">
            <div class="menu-header">
                <div class="menu-avatar" [style.background]="roleColor">
                    @if (profilePicUrl) {
                        <img [src]="profilePicUrl" alt="Avatar" class="avatar-img" [style.object-position]="profilePicPosition" />
                    } @else {
                        {{ userInitial }}
                    }
                </div>
                <div>
                    <div class="menu-name">{{ userDisplayName }}</div>
                    <div class="menu-email">{{ auth.currentUser()?.['email'] }}</div>
                </div>
            </div>
            <mat-divider />
            <button mat-menu-item routerLink="/profile">
                <mat-icon>person</mat-icon>
                <span>Profile</span>
            </button>
            <button mat-menu-item routerLink="/profile/security">
                <mat-icon>security</mat-icon>
                <span>Security</span>
            </button>
            <button mat-menu-item routerLink="/notifications">
                <mat-icon>notifications</mat-icon>
                <span>Notifications</span>
            </button>
            <mat-divider />
            <button mat-menu-item class="logout-item" (click)="logout()">
                <mat-icon>logout</mat-icon>
                <span>Sign Out</span>
            </button>
        </mat-menu>

    </div>
</div>
