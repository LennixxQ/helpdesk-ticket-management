<div class="layout-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar-container" [class.collapsed]="isSidebarCollapsed()" [style.width]="sidebarWidth">
        <app-sidebar [collapsed]="isSidebarCollapsed()" />
    </aside>

    <!-- Main Area -->
    <div class="main-area" [class.sidebar-collapsed]="isSidebarCollapsed()">

        <!-- Navbar -->
        <header class="navbar-container">
            <app-navbar (toggleSidebar)="toggleSidebar()" />
        </header>

        <!-- Page Content -->
        <main class="page-content" [class.full-width]="isFullWidth">
            <router-outlet />
        </main>

    </div>

</div>
